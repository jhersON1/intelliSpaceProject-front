<div class="flex justify-center items-center min-h-screen bg-gray-50 p-4">
    <div class="w-full max-w-lg bg-white p-6 sm:p-8 rounded-sm shadow-sm border border-gray-100">
        <div class="mb-6 sm:mb-8">
            <h2 class="text-xl sm:text-2xl font-light mb-1 text-gray-800">Iniciar sesión</h2>
            <p class="text-sm text-gray-500">Accede a tu cuenta</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="contents">
            <div class="mb-4 sm:mb-5">
                <label for="email" class="block text-gray-700 text-sm mb-2 font-light">
                    Correo electrónico
                </label>
                <input type="email" inputmode="email" autocomplete="email" id="email" formControlName="email"
                    class="w-full px-3 py-3 bg-gray-50 border-0 rounded-sm focus:outline-none focus:ring-1 focus:ring-gray-300 touch-manipulation"
                    [ngClass]="{'bg-red-50': hasFieldError('email')()}" />
                @if (hasFieldError('email')()) {
                <span class="text-red-500 text-xs mt-1">Por favor ingresa un correo electrónico válido</span>
                }
            </div>

            <div class="mb-4 sm:mb-5">
                <div class="flex justify-between items-center mb-2">
                    <label for="password" class="text-gray-700 text-sm font-light">
                        Contraseña
                    </label>
                    <a href="#" class="text-sm text-gray-800 hover:underline">
                        ¿Olvidaste tu contraseña?
                    </a>
                </div>
                <input type="password" autocomplete="current-password" id="password" formControlName="password"
                    class="w-full px-3 py-3 bg-gray-50 border-0 rounded-sm focus:outline-none focus:ring-1 focus:ring-gray-300 touch-manipulation"
                    [ngClass]="{'bg-red-50': hasFieldError('password')()}" />
                @if (hasFieldError('password')()) {
                <span class="text-red-500 text-xs mt-1">La contraseña es obligatoria</span>
                }
            </div>

            <div class="mb-6 sm:mb-8">
                <label class="inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="form-checkbox rounded-sm h-5 w-5" formControlName="rememberMe" />
                    <span class="ml-2 text-sm text-gray-600">
                        Recordarme en este dispositivo
                    </span>
                </label>
            </div>

            @if (authError()) {
            <div class="mb-6 p-3 bg-red-50 text-red-600 text-sm rounded-sm border border-red-100">
                {{ authError() }}
            </div>
            }

            <div class="mb-6">
                <button type="submit"
                    class="w-full bg-gray-800 hover:bg-black active:bg-black text-white font-light py-3 px-4 rounded-sm focus:outline-none touch-manipulation relative"
                    [disabled]="isAuthenticating()" [ngClass]="{'opacity-50': isAuthenticating()}">
                    @if (isAuthenticating()) {
                    <span class="flex justify-center items-center">
                        <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg"
                            fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        Iniciando sesión...
                    </span>
                    } @else {
                    Iniciar sesión
                    }
                </button>
            </div>

            <div class="text-center text-sm text-gray-600 mb-6">
                <a href="#/register" class="text-gray-800 hover:underline inline-block py-2 px-4">
                    ¿No tienes una cuenta? Regístrate
                </a>
            </div>
        </form>

        <div class="mt-6 sm:mt-10 text-center">
            <p class="text-xs text-gray-500 font-light">IntelliSpace</p>
        </div>
    </div>
</div>
