<!-- home.component.html -->
<div class="w-full relative bg-white overflow-hidden">
    <!-- Hero Section -->
    <div class="relative">
      <img class="w-full h-auto object-cover max-h-[1920px]" src="https://placehold.co/1440x652" alt="Hero Image" />
    </div>
    
    <!-- Make your life better section -->
    <div class="container mx-auto text-center py-8 max-w-8xl">
      <h1 class="text-4xl md:text-5xl font-semibold text-black mb-2">Make your life better</h1>
      <p class="text-xl font-light text-black">Find the perfect product</p>
    </div>
  
    <!-- Our Products Section -->
    <div class="container mx-auto px-4 py-12 max-w-8xl">
      <h2 class="text-3xl md:text-4xl font-normal mb-8">Our products</h2>
      
      <!-- Products Grid - No horizontal scroll, with min-width to prevent overlap -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        @for (product of products; track product.id) {
          <div class="product-card flex flex-col">
            <div class="w-full min-w-[280px] overflow-hidden">
              <img [src]="product.image" [alt]="product.name" class="w-full h-auto object-cover opacity-90" />
            </div>
            <h3 class="text-xl md:text-2xl font-normal mt-4">{{product.name}}</h3>
            <p class="text-neutral-400">{{product.company}}</p>
          </div>
        }
      </div>
    </div>
  
    <!-- Explore Section -->
    <div class="container mx-auto px-4 py-12 max-w-8xl">
      <h2 class="text-3xl md:text-4xl font-normal mb-8">Explore</h2>
      
      <!-- Categories Horizontal Scroll -->
      <div class="flex overflow-x-auto pb-8 space-x-4 snap-x">
        @for (category of categories; track category.id) {
          <div class="category-card flex-shrink-0 w-[435px] snap-center">
            <div class="w-[435px] h-[403px] overflow-hidden rounded-xl bg-white">
              <img [src]="category.image" [alt]="category.name" class="w-full h-full object-cover mix-blend-luminosity rounded-xl" />
            </div>
            <h3 class="text-xl md:text-2xl font-normal mt-4">{{category.name}}</h3>
          </div>
        }
      </div>
    </div>
  
    <!-- Share Your Setup Section -->
    <div class="container mx-auto px-4 py-12 max-w-8xl">
      <h2 class="text-3xl md:text-4xl font-normal mb-8">Share your setup with us</h2>
      
      <!-- User Gallery - Collage Style -->
      <div class="relative h-[700px] overflow-hidden">
        <!-- Primera fila -->
        <div class="absolute left-[34px] top-[0px] w-[213px] h-[304px]">
          <img src="https://placehold.co/213x304" alt="User setup" class="w-full h-full object-cover" />
        </div>
        
        <div class="absolute left-[259px] top-[0px] w-[350px] h-[248px]">
          <img src="https://placehold.co/350x248" alt="User setup" class="w-full h-full object-cover" />
